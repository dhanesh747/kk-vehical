<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Vehicle Rentals | KK Vehicle Sewa</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <header class="site-header">
    <div class="container nav-wrap">
      <a class="logo" href="index.html"><span class="logo-mark">🚘</span>KK VEHICLE SEWA</a>
      <div class="header-actions">
        <a class="btn btn-outline" href="index.html">Home</a>
        <a class="btn btn-dark nav-auth-btn" href="login.html">Login</a>
        <button class="theme-toggle" onclick="toggleTheme()">🌙</button>
      </div>
    </div>
  </header>

  <main class="container section">
    <div class="section-title-row"><h1>Premium Rental Fleet</h1><span class="badge">Verified vehicles • Transparent pricing</span></div>
    <div class="filters">
      <select id="rentalType"><option value="all">All Types</option><option value="hatchback">Hatchback</option><option value="sedan">Sedan</option><option value="suv">SUV</option><option value="bike">Bike</option><option value="scooter">Scooter</option><option value="truck">Truck</option></select>
      <select id="rentalCity"><option value="all">All Cities</option><option value="nagpur">Nagpur</option><option value="pune">Pune</option></select>
      <input id="rentalPrice" class="input" type="number" min="0" placeholder="Max price/day">
      <input id="rentalSeats" class="input" type="number" min="0" placeholder="Min seats">
      <button class="btn btn-primary" id="applyFilters" type="button">Apply Filters</button>
    </div>

    <div id="emptyState" class="panel" style="padding:16px; display:none;">No vehicles match your current filter criteria.</div>
    <section id="vehicleCards" class="rental-grid"></section>
  </main>

  <nav class="bottom-nav">
    <a href="index.html" class="nav-item"><span class="nav-icon">🏠</span><span>Home</span></a>
    <a href="rental-vehicles.html" class="nav-item active"><span class="nav-icon">🚗</span><span>Rentals</span></a>
    <a href="login.html" class="nav-item nav-auth-mobile"><span class="nav-icon">👤</span><span>Profile</span></a>
    <a href="tel:+919999999999" class="nav-item"><span class="nav-icon">📞</span><span>Support</span></a>
  </nav>
  <script src="script.js"></script>
</body>
</html>
