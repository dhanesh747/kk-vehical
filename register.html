<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Register | KK Vehicle Sewa</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <header class="site-header"><div class="container nav-wrap"><a class="logo" href="index.html"><span class="logo-mark">🚘</span>KK VEHICLE SEWA</a><div class="header-actions"><a class="btn btn-outline" href="login.html">Login</a><button class="theme-toggle" onclick="toggleTheme()">🌙</button></div></div></header>
  <main class="container auth-layout">
    <section class="panel auth-card">
      <h2>Create Your Account</h2>
      <p class="helper">Join to book vehicles, track documents, and receive renewal reminders.</p>
      <form id="registerForm" class="form" style="margin-top:14px;">
        <label class="form-label" for="registerName">Full Name</label>
        <input class="input" id="registerName" required>
        <label class="form-label" for="registerEmail">Email</label>
        <input class="input" id="registerEmail" type="email" required>
        <label class="form-label" for="registerPassword">Password</label>
        <input class="input" id="registerPassword" type="password" required>
        <label class="form-label" for="registerConfirmPassword">Confirm Password</label>
        <input class="input" id="registerConfirmPassword" type="password" required>
        <button class="btn btn-primary" type="submit">Register</button>
      </form>
    </section>
  </main>
  <script src="script.js"></script>
</body>
</html>
