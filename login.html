<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Login | KK Vehicle Sewa</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <header class="site-header"><div class="container nav-wrap"><a class="logo" href="index.html"><span class="logo-mark">🚘</span>KK VEHICLE SEWA</a><div class="header-actions"><a class="btn btn-outline" href="register.html">Create account</a><button class="theme-toggle" onclick="toggleTheme()">🌙</button></div></div></header>
  <main class="container auth-layout">
    <section class="panel auth-card">
      <h2>Welcome Back</h2>
      <p class="helper">Login to manage bookings, track requests, and access dashboard features.</p>
      <form id="loginForm" class="form" style="margin-top:14px;">
        <label class="form-label" for="loginEmail">Email</label>
        <input class="input" id="loginEmail" type="email" required>
        <label class="form-label" for="loginPassword">Password</label>
        <input class="input" id="loginPassword" type="password" required>
        <div id="loginError" class="error-box">Invalid credentials. Please try again.</div>
        <button class="btn btn-primary" type="submit">Login</button>
      </form>
      <p class="helper" style="margin-top:12px;">New user? <a href="register.html" style="color:var(--primary)">Create account</a></p>
    </section>
  </main>
  <script src="script.js"></script>
</body>
</html>
